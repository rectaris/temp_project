_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_envops:
  variable_start_string: "[["
  variable_end_string: "]]"
  block_start_string: "[%"
  block_end_string: "%]"
  comment_start_string: "[#"
  comment_end_string: "#]"
  lstrip_blocks: true
  trim_blocks: true
  keep_trailing_newline: true

_exclude:
  - "__pycache__"
  - "*.pyc"
  - "[% if codex_hooks_mode != 'enable_local_logging' %].codex/hooks.json[% else %]__never_exclude_hooks_json__[% endif %]"
  - "[% if skillspector_mode != 'document_optional' %]scripts/skillspector-scan.sh[% else %]__never_exclude_skillspector__[% endif %]"

project_name:
  type: str
  help: Human-facing project name.
  default: "Example Project"

project_slug:
  type: str
  help: Stable repository slug used in agent docs.
  default: "example-project"

project_purpose:
  type: str
  help: One sentence describing what the repository builds or maintains.
  default: "Build and maintain the project."

primary_language:
  type: str
  help: Main implementation surface for validation defaults.
  choices:
    - typescript
    - python
    - mixed
    - docs
  default: "mixed"

codex_hooks_mode:
  type: str
  help: Choose whether Codex hook templates are only installed or local logging hooks are active.
  choices:
    - disabled
    - install_templates
    - enable_local_logging
  default: "[% if use_hooks is defined and not use_hooks %]disabled[% else %]install_templates[% endif %]"

skillspector_mode:
  type: str
  help: Choose whether optional NVIDIA SkillSpector scan documentation is generated.
  choices:
    - disabled
    - document_optional
  default: "[% if use_skillspector is defined and use_skillspector %]document_optional[% else %]disabled[% endif %]"

mcp_policy_mode:
  type: str
  help: Document optional MCP integration policy without authorizing external reads or writes.
  choices:
    - disabled
    - document_optional
  default: "[% if use_mcp_policy is defined and use_mcp_policy %]document_optional[% else %]disabled[% endif %]"

linear_sync_mode:
  type: str
  help: Document optional Linear planning sync without authorizing external reads or writes.
  choices:
    - disabled
    - document_optional
  default: "[% if use_linear_sync is defined and use_linear_sync %]document_optional[% else %]disabled[% endif %]"

graph_memory_mode:
  type: str
  help: Document optional graph-memory integration without authorizing external reads or writes.
  choices:
    - disabled
    - document_optional
  default: "[% if use_graph_memory is defined and use_graph_memory %]document_optional[% else %]disabled[% endif %]"
