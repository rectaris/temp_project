_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_envops:
  variable_start_string: "[["
  variable_end_string: "]]"
  block_start_string: "[%"
  block_end_string: "%]"
  comment_start_string: "[#"
  comment_end_string: "#]"
  lstrip_blocks: true
  trim_blocks: true
  keep_trailing_newline: true

_exclude:
  - "__pycache__"
  - "*.pyc"
  - "[% if codex_hooks_mode != 'enable_local_logging' %].codex/hooks.json[% else %]__never_exclude_hooks_json__[% endif %]"
  - "[% if skillspector_mode != 'document_optional' %]scripts/skillspector-scan.sh[% else %]__never_exclude_skillspector__[% endif %]"

project_name:
  type: str
  help: 人間向けのプロジェクト名を入力してください。
  default: "Example Project"

project_slug:
  type: str
  help: エージェント文書で使う安定したリポジトリ識別子を入力してください。
  default: "example-project"

project_purpose:
  type: str
  help: このリポジトリが構築または保守する内容を1文で入力してください。
  default: "Build and maintain the project."

primary_language:
  type: str
  help: 検証の既定値に使う主な実装対象を選んでください。
  choices:
    TypeScript 中心: typescript
    Python 中心: python
    複数言語: mixed
    ドキュメント中心: docs
  default: "mixed"

codex_hooks_mode:
  type: str
  help: Codex hooks の導入方法を選んでください。
  choices:
    無効にする: disabled
    テンプレートだけ導入する: install_templates
    ローカルログ記録を有効にする: enable_local_logging
  default: "[% if use_hooks is defined and not use_hooks %]disabled[% else %]install_templates[% endif %]"

skillspector_mode:
  type: str
  help: 任意の NVIDIA SkillSpector スキャン手順を生成するか選んでください。
  choices:
    生成しない: disabled
    任意手順として生成する: document_optional
  default: "[% if use_skillspector is defined and use_skillspector %]document_optional[% else %]disabled[% endif %]"

mcp_policy_mode:
  type: str
  help: 外部読み書きを許可せず、任意の MCP 連携方針だけを文書化するか選んでください。
  choices:
    文書化しない: disabled
    任意方針として文書化する: document_optional
  default: "[% if use_mcp_policy is defined and use_mcp_policy %]document_optional[% else %]disabled[% endif %]"

linear_sync_mode:
  type: str
  help: 外部読み書きを許可せず、任意の Linear 計画同期方針だけを文書化するか選んでください。
  choices:
    文書化しない: disabled
    任意方針として文書化する: document_optional
  default: "[% if use_linear_sync is defined and use_linear_sync %]document_optional[% else %]disabled[% endif %]"

graph_memory_mode:
  type: str
  help: 外部読み書きを許可せず、任意の graph memory 連携方針だけを文書化するか選んでください。
  choices:
    文書化しない: disabled
    任意方針として文書化する: document_optional
  default: "[% if use_graph_memory is defined and use_graph_memory %]document_optional[% else %]disabled[% endif %]"
