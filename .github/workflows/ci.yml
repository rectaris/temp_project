name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: UV_CACHE_DIR=.uv-cache uv sync

      - name: Check Copier
        run: UV_CACHE_DIR=.uv-cache uv run copier --version

      - name: Lint package structure
        run: scripts/lint-project-workflow.sh

      - name: Smoke test generated projects
        run: tests/smoke.sh
        env:
          REQUIRE_COPIER: "1"

      - name: Test generated hooks
        run: tests/test-hooks.py

      - name: Test Copier update flow
        run: tests/copier-update.sh
        env:
          REQUIRE_COPIER: "1"

      - name: Check whitespace
        run: git diff --check
